<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PDX Flights">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<title>PDX Flight Entry</title>
<style>
*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f5f7fb;color:#172033;font-size:16px}header{position:sticky;top:0;background:#f5f7fb;border-bottom:1px solid #dbe3ee;padding:12px;z-index:3}h1{font-size:20px;margin:0}main{max-width:960px;margin:auto;padding:10px 10px 110px}.card{background:white;border:1px solid #dbe3ee;border-radius:16px;padding:12px;margin:10px 0}h2{font-size:18px;margin:0 0 10px}label{display:block;font-size:12px;color:#607087;margin-bottom:3px}.req:after{content:' *';color:#b42318}.grid{display:grid;gap:8px}.one{grid-template-columns:1fr}.two{grid-template-columns:1fr 1fr}.compact{grid-template-columns:repeat(auto-fit,minmax(70px,1fr))}input,select,textarea{width:100%;min-height:40px;border:1px solid #ccd6e3;border-radius:10px;padding:7px 8px;font-size:16px;background:#fff}textarea{min-height:70px}.num{text-align:right}.total{font-weight:700;background:#edf4ff}.row{display:grid;grid-template-columns:1fr 70px 60px 55px 65px 55px 55px 1.25fr 64px;gap:6px;border:1px solid #dbe3ee;border-radius:12px;padding:8px;margin:8px 0;background:#fbfcff;align-items:end}button{border:0;border-radius:12px;padding:11px 13px;background:#2563eb;color:white;font-weight:700;min-height:44px;font-size:15px}.secondary{background:#eef2f7;color:#172033}.danger{background:#fee4e2;color:#912018}.actions{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid #dbe3ee;display:flex;gap:8px;overflow-x:auto;padding:10px;z-index:5}.hint,.status{font-size:12px;color:#607087}.previewKey{font-weight:800;font-size:20px;margin:4px 0}.badge{border-radius:999px;padding:2px 9px;background:#eef2f7;font-weight:700}.open{background:#dcfae6;color:#067647}.closed{background:#fee4e2;color:#b42318}.previewLine{display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:6px}.previewPair{display:flex;gap:5px;min-width:98px;align-items:baseline}.previewPair .lbl{font-size:12px;color:#607087}.previewPair .val{font-weight:700;min-width:34px;text-align:right;font-variant-numeric:tabular-nums}.spacer{height:10px}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid #dbe3ee;padding:6px;text-align:left}td.num,th.num{text-align:right}.record{border:1px solid #dbe3ee;border-radius:12px;padding:9px;margin:8px 0}.flightAware{display:block;margin-top:12px;font-weight:700}@media(max-width:760px){.row{grid-template-columns:1fr 1fr 1fr}.row .wide,.row button{grid-column:1/-1}.two{grid-template-columns:1fr 1fr}}@media print{header,.actions,.noPrint,button{display:none!important}main{padding:0}.card{border:0}}
</style>
</head><body>
<header><h1>PDX International Flight Data</h1><div class="hint">iPhone web app: host this folder, open index.html in Safari, then Share → Add to Home Screen.</div></header>
<main><form id="flightForm" onsubmit="return false">
<section class="card"><h2>Inbound Flight</h2>
<div class="grid one"><div><label class="req">Date</label><input id="date" type="date" data-required></div></div>
<div class="grid two" style="margin-top:8px"><div><label class="req">Airline</label><select id="airline" data-airline data-required></select></div><div><label class="req">Flight No</label><input id="flightNo" maxlength="4" inputmode="numeric" class="num" data-required></div></div>
<div class="grid two" style="margin-top:8px"><div><label class="req">ETA</label><input id="eta" maxlength="4" inputmode="numeric" class="num" data-required></div><div><label>TSA Status</label><select id="tsaStatus"><option value="">N/A</option><option>OPEN</option><option>CLOSED</option></select></div></div>
<div style="margin-top:8px"><label>Inbound Notes</label><textarea id="notes"></textarea></div>
</section>
<section class="card"><h2>Passengers, Bags, Assistance</h2>
<div class="grid compact"><div><label class="req">Total Pax</label><input id="totalPax" maxlength="4" class="num total" data-required></div><div><label>Total Bags</label><input id="totalBags" maxlength="4" class="num"></div><div><label class="req">WCHR</label><input id="wchr" maxlength="4" class="num" data-required></div><div><label>WCHC</label><input id="wchc" maxlength="4" class="num" value="0"></div><div><label class="req">Conn Pax</label><input id="connPaxTotal" maxlength="4" class="num total" data-required></div><div><label class="req">Conn Bags</label><input id="connBagsTotal" maxlength="4" class="num total" data-required></div><div><label class="req">PETC</label><input id="petc" maxlength="4" class="num" data-required></div></div>
<div class="grid compact" style="margin-top:10px"><div><label>J</label><input id="paxJ" maxlength="4" inputmode="numeric" class="num"></div><div><label>W</label><input id="paxW" maxlength="4" inputmode="numeric" class="num"></div><div><label>M</label><input id="paxM" maxlength="4" inputmode="numeric" class="num"></div><div><label>UM</label><input id="paxUM" maxlength="4" inputmode="numeric" class="num"></div><div><label>Inf</label><input id="paxInf" maxlength="4" inputmode="numeric" class="num"></div><div><label>Child</label><input id="paxChild" maxlength="4" inputmode="numeric" class="num"></div><div><label>Missing Bags</label><input id="missingBags" maxlength="4" class="num"></div><div><label>Rush Bags</label><input id="rushBags" maxlength="4" class="num"></div></div>
</section>
<section class="card"><h2>Connecting Flights</h2><div id="connections"></div><button type="button" class="secondary" data-action="addConnection">Add connecting flight</button></section>
<section class="card"><h2>Optional Outbound Data</h2><div id="outbounds"></div><button type="button" class="secondary" data-action="addOutbound">Add outbound flight</button><div style="margin-top:8px"><label>Outbound Notes</label><textarea id="outboundNotes"></textarea></div></section>
<section class="card"><h2>Preview</h2><div id="preview"></div></section>
<section class="card noPrint"><h2>Saved Flights</h2><div id="saved"></div><div id="status" class="status"></div></section>
</form></main>
<div class="actions"><button type="button" data-action="save">Save Flight</button><button type="button" class="secondary" data-action="new">New Flight</button><button type="button" class="secondary" data-action="print">Print</button><button type="button" class="secondary" data-action="email">Email</button><button type="button" class="secondary" data-action="text">Text</button><button type="button" class="secondary" data-action="json">Export JSON</button><button type="button" class="secondary" data-action="csv">Export CSV</button></div>
<script>
(function(){
var KEY='pdxFlightData.crossPlatform.v1',currentId='';
var AIR=[['','Select'],['ASA','Alaska'],['BAW','British Airways'],['CFG','Condor'],['ICE','Icelandair'],['KLM','KLM'],['VOI','Volaris'],['SWA','Southwest'],['DAL','Delta'],['AAL','American']];
function el(id){return document.getElementById(id)}
function val(id){var x=el(id);return x?String(x.value||'').trim():''}
function set(id,v){var x=el(id);if(x)x.value=v||''}
function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function n(v){v=String(v||'').trim(); if(v.toUpperCase()==='NA')return 0; var x=parseInt(v,10); return isNaN(x)?0:x}
function pad(s,w){s=String(s==null?'':s);while(s.length<(w||4))s=' '+s;return s}
function airlinesHTML(){var h='';for(var i=0;i<AIR.length;i++)h+='<option value="'+AIR[i][0]+'">'+AIR[i][0]+'</option>';return h.replace('><','>Select<')}
function fillAirlines(root){var list=(root||document).querySelectorAll('[data-airline]');for(var i=0;i<list.length;i++)list[i].innerHTML=airlinesHTML()}
function rowHTML(){return '<div class="row"><div><label>Airline</label><select data-k="airline" data-airline></select></div><div><label>Flight No</label><input data-k="flightNo" maxlength="4" inputmode="numeric" class="num"></div><div><label>Dest</label><input data-k="dest" maxlength="3" autocapitalize="characters" style="text-transform:uppercase"></div><div><label>Gate</label><input data-k="gate" maxlength="4"></div><div><label>ETD</label><input data-k="etd" maxlength="4" inputmode="numeric" class="num"></div><div><label>Pax</label><input data-k="pax" maxlength="4" inputmode="numeric" class="num"></div><div><label>Bags</label><input data-k="bags" maxlength="4" inputmode="numeric" class="num"></div><div class="wide"><label>Notes</label><input data-k="notes"></div><button type="button" class="danger" data-action="removeRow">Remove</button></div>'}
function addRow(containerId,data){var d=document.createElement('div');d.innerHTML=rowHTML();var row=d.firstChild;el(containerId).appendChild(row);fillAirlines(row);data=data||{};var ins=row.querySelectorAll('[data-k]');for(var i=0;i<ins.length;i++){var k=ins[i].getAttribute('data-k');ins[i].value=(k==='dest'?String(data[k]||'').toUpperCase():data[k]||'')}return row}
function readRows(containerId){var rows=el(containerId).children,out=[];for(var i=0;i<rows.length;i++){var o={},has=false,ins=rows[i].querySelectorAll('[data-k]');for(var j=0;j<ins.length;j++){var k=ins[j].getAttribute('data-k'),v=String(ins[j].value||'').trim();if(k==='dest')v=v.toUpperCase();o[k]=v;if(v)has=true}if(has)out.push(o)}return out}
function totals(){var pax=n(val('paxJ'))+n(val('paxW'))+n(val('paxM'))+n(val('paxUM'))+n(val('paxChild'));if(!el('totalPax').getAttribute('data-manual'))set('totalPax',pax||'');var c=readRows('connections'),cp=0,cb=0;for(var i=0;i<c.length;i++){cp+=n(c[i].pax);cb+=n(c[i].bags)}if(!el('connPaxTotal').getAttribute('data-manual'))set('connPaxTotal',cp||'');if(!el('connBagsTotal').getAttribute('data-manual'))set('connBagsTotal',cb||'')}
function record(){totals();return {id:currentId||('id-'+Date.now()),savedAt:new Date().toISOString(),inbound:{date:val('date'),airline:val('airline'),flightNo:val('flightNo'),eta:val('eta'),tsaStatus:val('tsaStatus'),totalPax:val('totalPax'),totalBags:val('totalBags'),wchr:val('wchr'),wchc:val('wchc'),connPaxTotal:val('connPaxTotal'),connBagsTotal:val('connBagsTotal'),petc:val('petc'),pax:{J:val('paxJ'),W:val('paxW'),M:val('paxM'),UM:val('paxUM'),Inf:val('paxInf'),Child:val('paxChild')},missingBags:val('missingBags'),rushBags:val('rushBags'),notes:val('notes'),connections:readRows('connections')},outbound:{flights:readRows('outbounds'),notes:val('outboundNotes')}}}
function fa(f){var id=(f.airline+f.flightNo).toUpperCase();return id?'https://www.flightaware.com/live/flight/'+encodeURIComponent(id):''}
function pair(a,b){return '<span class="previewPair"><span class="lbl">'+esc(a)+'</span><span class="val">'+esc(b||'0')+'</span></span>'}
function preview(){var r=record(),f=r.inbound,p=f.pax,h='<div class="previewKey">'+esc(f.airline)+' '+esc(f.flightNo)+' &nbsp; Date: '+esc(f.date)+' &nbsp; ETA: '+esc(f.eta)+'</div><div>TSA Status: <span class="badge '+(f.tsaStatus==='OPEN'?'open':f.tsaStatus==='CLOSED'?'closed':'')+'">'+esc(f.tsaStatus||'N/A')+'</span></div>';h+='<div class="previewLine" style="margin-top:10px">'+pair('Total Pax',f.totalPax)+pair('Total Bags',f.totalBags)+'</div><div class="spacer"></div><div class="previewLine">'+pair('WCHR',f.wchr)+pair('WCHC',f.wchc)+pair('Conn Pax',f.connPaxTotal)+pair('Conn Bags',f.connBagsTotal)+pair('PETC',f.petc)+'</div><div class="previewLine">'+pair('J',p.J)+pair('W',p.W)+pair('M',p.M)+pair('UM',p.UM)+pair('Inf',p.Inf)+pair('Child',p.Child)+pair('Missing Bags',f.missingBags)+pair('Rush Bags',f.rushBags)+'</div>';if(f.notes)h+='<p><b>Inbound Notes:</b> '+esc(f.notes)+'</p>';function table(t,arr){if(!arr.length)return '';var x='<h3>'+t+'</h3><table><tr><th>Airline</th><th class="num">Flight</th><th>Dest</th><th>Gate</th><th class="num">ETD</th><th class="num">Pax</th><th class="num">Bags</th><th>Notes</th></tr>';for(var i=0;i<arr.length;i++){var c=arr[i];x+='<tr><td>'+esc(c.airline)+'</td><td class="num">'+esc(c.flightNo)+'</td><td>'+esc(String(c.dest||'').toUpperCase())+'</td><td>'+esc(c.gate)+'</td><td class="num">'+esc(c.etd)+'</td><td class="num">'+esc(c.pax)+'</td><td class="num">'+esc(c.bags)+'</td><td>'+esc(c.notes)+'</td></tr>'}return x+'</table>'}h+=table('Connecting Flights',f.connections)+table('Outbound',r.outbound.flights);if(r.outbound.notes)h+='<p><b>Outbound Notes:</b> '+esc(r.outbound.notes)+'</p>';var link=fa(f);if(link)h+='<a class="flightAware" href="'+esc(link)+'" target="_blank">FlightAware: '+esc(f.airline+f.flightNo)+'</a>';el('preview').innerHTML=h}
function text(){var r=record(),f=r.inbound,s=f.date+'\n'+(f.airline+' '+f.flightNo).trim()+'\n'+f.eta+'\n'+(f.tsaStatus||'N/A')+'\n\n';s+='Total Pax: '+pad(f.totalPax)+'\nTotal Bags: '+pad(f.totalBags)+'\nWCHR: '+pad(f.wchr)+'\nWCHC: '+pad(f.wchc)+'\nConn Pax: '+pad(f.connPaxTotal)+'\nConn Bags: '+pad(f.connBagsTotal)+'\nPETC: '+pad(f.petc)+'\n';if(f.connections.length){s+='\nCONNECTING FLIGHTS\n';for(var i=0;i<f.connections.length;i++){var c=f.connections[i];s+=(c.airline||'')+' '+pad(c.flightNo,4)+' '+String(c.dest||'').toUpperCase()+' Gate '+(c.gate||'')+' ETD '+(c.etd||'')+' Pax '+(c.pax||'')+' Bags '+(c.bags||'')+(c.notes?' '+c.notes:'')+'\n'}}var link=fa(f);if(link)s+='\nFlightAware: '+link;return s}
function db(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
function setdb(a){localStorage.setItem(KEY,JSON.stringify(a));saved()}
function validate(){var req=document.querySelectorAll('[data-required]'),m=[];for(var i=0;i<req.length;i++)if(!String(req[i].value||'').trim()){var lab=req[i].parentNode.querySelector('label');m.push(lab?lab.textContent.replace(' *',''):'Required')}if(m.length){alert('Enter a value or NA for: '+m.join(', '));return false}return true}
function save(){if(!validate())return;var r=record(),a=db(),out=[];currentId=r.id;for(var i=0;i<a.length;i++)if(a[i].id!==r.id)out.push(a[i]);out.unshift(r);setdb(out);preview();alert('Saved on this device/browser.')}
function saved(){var a=db(),h='';for(var i=0;i<a.length;i++){var f=a[i].inbound;h+='<div class="record"><b>'+esc(f.date)+' '+esc(f.airline)+esc(f.flightNo)+'</b> ETA '+esc(f.eta)+' Pax '+esc(f.totalPax)+'<br><button type="button" class="secondary" data-action="open" data-id="'+a[i].id+'">Open</button> <button type="button" class="danger" data-action="delete" data-id="'+a[i].id+'">Delete</button></div>'}el('saved').innerHTML=h||'No saved flights yet.';try{localStorage.setItem('test','1');localStorage.removeItem('test');el('status').textContent='Storage available. No setup required.'}catch(e){el('status').textContent='Storage unavailable. Use normal browser mode or export each record.'}}
function load(id){var a=db(),r=null;for(var i=0;i<a.length;i++)if(a[i].id===id)r=a[i];if(!r)return;newForm(false);currentId=r.id;var f=r.inbound,o=r.outbound||{},p=f.pax||{};['date','airline','flightNo','eta','tsaStatus','totalPax','totalBags','wchr','wchc','connPaxTotal','connBagsTotal','petc','missingBags','rushBags','notes'].forEach(function(k){set(k,f[k])});set('paxJ',p.J);set('paxW',p.W);set('paxM',p.M);set('paxUM',p.UM);set('paxInf',p.Inf);set('paxChild',p.Child);for(i=0;i<(f.connections||[]).length;i++)addRow('connections',f.connections[i]);for(i=0;i<(o.flights||[]).length;i++)addRow('outbounds',o.flights[i]);set('outboundNotes',o.notes);preview()}
function del(id){if(!confirm('Delete saved flight?'))return;var a=db(),o=[];for(var i=0;i<a.length;i++)if(a[i].id!==id)o.push(a[i]);setdb(o);preview()}
function newForm(withDate){currentId='';el('flightForm').reset();el('connections').innerHTML='';el('outbounds').innerHTML='';set('wchc','0');el('totalPax').removeAttribute('data-manual');el('connPaxTotal').removeAttribute('data-manual');el('connBagsTotal').removeAttribute('data-manual');if(withDate!==false)set('date',new Date().toISOString().slice(0,10));preview()}
function download(name,type,content){var blob=new Blob([content],{type:type});if(navigator.share&&navigator.canShare){try{var file=new File([blob],name,{type:type});navigator.share({files:[file],title:name});return}catch(e){}}var a=document.createElement('a'),url=URL.createObjectURL(blob);a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a)},500)}
function csv(){var rows=[['Saved At','Date','Airline','Flight No','ETA','TSA','Total Pax','Total Bags','WCHR','WCHC','Conn Pax','Conn Bags','PETC','Notes']],a=db();for(var i=0;i<a.length;i++){var f=a[i].inbound;rows.push([a[i].savedAt,f.date,f.airline,f.flightNo,f.eta,f.tsaStatus,f.totalPax,f.totalBags,f.wchr,f.wchc,f.connPaxTotal,f.connBagsTotal,f.petc,f.notes])}var s='';for(i=0;i<rows.length;i++){for(var j=0;j<rows[i].length;j++){rows[i][j]='"'+String(rows[i][j]||'').replace(/"/g,'""')+'"'}s+=rows[i].join(',')+'\n'}download('pdx-flight-data.csv','text/csv',s)}
function act(a,id){if(a==='addConnection')addRow('connections',{});else if(a==='addOutbound')addRow('outbounds',{});else if(a==='removeRow'){var row=id;while(row&&row.className!=='row')row=row.parentNode;if(row)row.parentNode.removeChild(row)}else if(a==='save')save();else if(a==='new')newForm(true);else if(a==='print')window.print();else if(a==='email')location.href='mailto:?subject='+encodeURIComponent('PDX Flight Data '+val('airline')+val('flightNo'))+'&body='+encodeURIComponent(text());else if(a==='text')location.href='sms:?&body='+encodeURIComponent(text());else if(a==='json')download('pdx-flight-data.json','application/json',JSON.stringify(db(),null,2));else if(a==='csv')csv();else if(a==='open')load(id);else if(a==='delete')del(id);totals();preview();saved()}
document.addEventListener('click',function(e){var t=e.target,a=t&&t.getAttribute('data-action');if(a){e.preventDefault();act(a,t.getAttribute('data-id')||t)}});
document.addEventListener('input',function(e){var t=e.target;if(t&&t.getAttribute('data-k')==='dest')t.value=t.value.toUpperCase();if(t&&/^(totalPax|connPaxTotal|connBagsTotal)$/.test(t.id))t.setAttribute('data-manual','1');totals();preview()});
document.addEventListener('change',function(){totals();preview()});
fillAirlines(document);newForm(true);saved();
})();
</script>
<script>
if ("serviceWorker" in navigator) { window.addEventListener("load", function () { navigator.serviceWorker.register("./sw.js").catch(function () {}); }); }
</script>
</body></html>
